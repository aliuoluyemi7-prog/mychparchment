<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#F1E6CC;
    --parchment-deep:#E6D6AC;
    --parchment-card:#F6EDD6;
    --ink:#2B2419;
    --ink-soft:#5A4F3C;
    --wine:#7A2E2E;
    --wine-deep:#5E2222;
    --gold:#A9802E;
    --gold-soft:#C9A35C;
    --sepia-line:#CBB888;
    --shadow:rgba(43,36,25,0.18);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--parchment);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(169,128,46,0.08), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(122,46,46,0.06), transparent 60%);
    color:var(--ink);
    font-family:'Source Sans 3', sans-serif;
    line-height:1.5;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{max-width:760px;margin:0 auto;padding:28px 18px 80px;}

  /* ---------- Header ---------- */
  header{text-align:center;margin-bottom:30px;position:relative;}
  header .crest{
    width:84px;height:auto;
    margin:0 auto 10px;
    display:block;
    filter:drop-shadow(0 3px 6px var(--shadow));
  }
  h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:700;
    font-size:clamp(34px,7vw,46px);
    letter-spacing:0.5px;
    margin:0 0 4px;
  }
  header p.tagline{
    font-style:italic;
    color:var(--ink-soft);
    font-size:15px;
    margin:0;
  }
  .ruled{
    border:none;height:1px;
    background:linear-gradient(to right, transparent, var(--sepia-line), transparent);
    margin:24px 0;
  }

  /* ---------- Composer ---------- */
  .composer{
    background:var(--parchment-card);
    border:1px solid var(--sepia-line);
    border-radius:3px;
    padding:22px 20px;
    box-shadow:0 4px 14px var(--shadow);
    position:relative;
  }
  .composer::before{
    content:"";
    position:absolute;top:0;left:0;right:0;height:4px;
    background:repeating-linear-gradient(90deg, var(--gold-soft) 0 10px, transparent 10px 16px);
    opacity:0.5;
  }
  .field-label{
    display:block;
    font-size:12.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 5px;
    font-weight:600;
  }
  .field-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .field-row > div{flex:1;min-width:140px;}
  input[type=text], input[type=date], textarea{
    width:100%;
    font-family:'Source Sans 3',sans-serif;
    font-size:15.5px;
    color:var(--ink);
    background:#FBF5E6;
    border:1px solid var(--sepia-line);
    border-radius:2px;
    padding:10px 11px;
  }
  input:focus, textarea:focus{
    outline:2px solid var(--gold-soft);
    outline-offset:1px;
  }
  textarea{min-height:140px;resize:vertical;line-height:1.6;}
  #noteTitle{
    font-family:'Cormorant Garamond',serif;
    font-size:21px;
    font-weight:600;
  }

  .detected-wrap{margin-top:12px;min-height:14px;}

  .reflection-section{margin-top:20px;padding-top:16px;border-top:1px dashed var(--sepia-line);}
  .reflection-prompt{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:16px;
    color:var(--wine-deep);
    margin:0 0 6px;
  }
  textarea.reflection-input{min-height:60px;margin-bottom:14px;}
  textarea.reflection-input:last-child{margin-bottom:0;}

  .reflection-block{
    margin:10px 0;
    padding:8px 0 8px 12px;
    border-left:3px solid var(--gold-soft);
  }
  .reflection-block .r-label{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:13.5px;
    color:var(--wine);
    display:block;
    margin-bottom:3px;
  }
  .reflection-block .r-text{font-size:14.5px;color:var(--ink);white-space:pre-wrap;}

  .focus-card{
    margin-bottom:24px;padding:16px 18px;
    border:1px dashed var(--sepia-line);border-radius:3px;
    background:rgba(246,237,214,0.5);
  }
  .focus-card .field-label{margin-bottom:6px;}
  .focus-card .focus-text{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-size:17px;
    color:var(--ink-soft);
  }
  .detected-label{font-size:12px;color:var(--ink-soft);margin-bottom:6px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .seal{
    display:inline-flex;align-items:center;gap:5px;
    background:radial-gradient(circle at 30% 25%, var(--wine) 0%, var(--wine-deep) 75%);
    color:#F3E6D2;
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:13.5px;
    padding:5px 12px 5px 10px;
    border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,0.15) inset, 0 2px 4px var(--shadow);
  }
  .tag-chip{
    display:inline-flex;align-items:center;
    background:#EDE0BD;
    border:1px solid var(--gold-soft);
    color:var(--ink-soft);
    font-size:12.5px;
    padding:4px 10px;
    border-radius:12px;
  }

  .composer-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}
  button{
    font-family:'Source Sans 3',sans-serif;
    font-weight:600;
    font-size:14.5px;
    border-radius:3px;
    padding:10px 18px;
    cursor:pointer;
    border:1px solid transparent;
  }
  .btn-primary{background:var(--wine);color:#F3E6D2;}
  .btn-primary:hover{background:var(--wine-deep);}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--sepia-line);}
  .btn-ghost:hover{background:rgba(0,0,0,0.04);}
  button:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

  /* ---------- Library ---------- */
  .library-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin:38px 0 14px;flex-wrap:wrap;gap:8px;
  }
  .library-head h2{
    font-family:'Cormorant Garamond',serif;
    font-size:24px;margin:0;font-weight:600;
  }
  .count-tag{font-size:13px;color:var(--ink-soft);}
  .search-row{margin-bottom:18px;}
  #searchInput{background:#FBF5E6;}

  .empty-state{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-soft);
    font-style:italic;
    font-family:'Cormorant Garamond',serif;
    font-size:18px;
    border:1px dashed var(--sepia-line);
    border-radius:3px;
  }

  .note-card{
    background:var(--parchment-card);
    border:1px solid var(--sepia-line);
    box-shadow:0 3px 10px var(--shadow);
    margin-bottom:18px;
    padding:18px 19px 16px;
    position:relative;
    clip-path:polygon(
      0% 1.5%, 2% 0%, 6% 1%, 11% 0%, 16% 1.2%, 22% 0.3%, 29% 1%, 36% 0.2%, 44% 1%, 52% 0.3%,
      60% 1.1%, 68% 0.2%, 76% 1%, 84% 0.3%, 91% 1%, 96% 0.2%, 100% 1.3%,
      100% 98.5%, 97% 100%, 92% 99%, 86% 100%, 80% 98.8%, 73% 100%, 65% 99%, 57% 100%, 49% 99%,
      41% 100%, 33% 98.8%, 25% 100%, 18% 99%, 11% 100%, 5% 99.2%, 0% 100%
    );
  }
  .note-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px;}
  .note-title{
    font-family:'Cormorant Garamond',serif;
    font-weight:700;
    font-size:20px;
    margin:0;
  }
  .note-date{font-size:12px;color:var(--ink-soft);white-space:nowrap;margin-top:4px;}
  .note-meta{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
  .note-body{
    font-size:15px;color:var(--ink);
    white-space:pre-wrap;
    margin:10px 0 4px;
  }
  .note-body.collapsed{
    max-height:4.6em;overflow:hidden;
    -webkit-mask-image:linear-gradient(to bottom, black 65%, transparent 100%);
            mask-image:linear-gradient(to bottom, black 65%, transparent 100%);
  }
  .note-actions{display:flex;justify-content:flex-end;gap:14px;margin-top:8px;}
  .link-btn{
    background:none;border:none;padding:0;
    font-size:13px;color:var(--wine);font-weight:600;
    text-decoration:underline;text-decoration-color:rgba(122,46,46,0.35);
  }
  .link-btn.danger{color:#8a3a3a;}

  footer{
    text-align:center;margin-top:50px;
    font-size:12.5px;color:var(--ink-soft);
    font-style:italic;
  }

  @media (prefers-reduced-motion: no-preference){
    .note-card{transition:box-shadow 0.2s ease;}
  }
  @media (max-width:480px){
    .field-row{flex-direction:column;}
    h1{font-size:34px;}
  }
</style>
</head>

        <input type="text" id="notePreacher" placeholder="Who brought the word?">
      </div>
      <div>
        <span class="field-label">Topic</span>
        <input type="text" id="noteTopic" placeholder="What was it about?">
      </div>
      <div style="max-width:170px;">
        <span class="field-label">Date</span>
        <input type="date" id="noteDate">
      </div>
    </div>

    <span class="field-label">Your notes</span>
    <textarea id="noteBody" placeholder="Write what you're hearing. Mention any scripture as you go — John 3:16, Romans 8:28 — and it will be sealed below automatically."></textarea>

    <div class="detected-wrap" id="detectedWrap"></div>

    <div class="reflection-section">
      <p class="reflection-prompt">What did God say to you?</p>
      <textarea id="noteReflection" class="reflection-input" placeholder="One or two sentences is enough."></textarea>

      <p class="reflection-prompt">What will you do this week?</p>
      <textarea id="noteAction" class="reflection-input" placeholder="Name one thing."></textarea>
    </div>

    <div class="composer-actions">
      <button class="btn-ghost" id="clearBtn" type="button">Clear</button>
      <button class="btn-primary" id="saveBtn" type="button">Save this note</button>
    </div>
  </section>

  <hr class="ruled">

  <div class="focus-card">
    <span class="field-label">This Week's Focus</span>
    <div class="focus-text" id="weeklyFocus">No focus yet — write a note and name one thing.</div>
  </div>

  <div class="library-head">
    <h2>Sermon Library</h2>
    <span class="count-tag" id="countTag">0 sealed</span>
  </div>

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Search by title, preacher, topic, or verse...">
  </div>

  <div id="libraryList"></div>

  <footer>Every note here stays on this device.</footer>
</div>

<script>
(function(){

  // ---------- Scripture detection ----------
  var books = [
    "Genesis","Exodus","Leviticus","Numbers","Deuteronomy","Joshua","Judges","Ruth",
    "Samuel","Kings","Chronicles","Ezra","Nehemiah","Esther","Job","Psalms?","Proverbs",
    "Ecclesiastes","Song of Solomon","Song of Songs","Isaiah","Jeremiah","Lamentations",
    "Ezekiel","Daniel","Hosea","Joel","Amos","Obadiah","Jonah","Micah","Nahum","Habakkuk",
    "Zephaniah","Haggai","Zechariah","Malachi","Matthew","Mark","Luke","John","Acts",
    "Romans","Corinthians","Galatians","Ephesians","Philippians","Colossians",
    "Thessalonians","Timothy","Titus","Philemon","Hebrews","James","Peter","Jude",
    "Revelation","Gen","Exod","Lev","Num","Deut","Josh","Judg","Ps","Prov","Eccl","Isa",
    "Jer","Lam","Ezek","Dan","Hos","Obad","Mic","Nah","Hab","Zeph","Hag","Zech","Mal",
    "Matt","Rom","Cor","Gal","Eph","Phil","Col","Thess","Tim","Heb","Jas","Pet","Rev"
  ];
  var booksPattern = books.sort(function(a,b){return b.length-a.length;}).join("|");
  var verseRegex = new RegExp(
    "\\b((?:[1-3]\\s)?(?:" + booksPattern + ")\\.?)\\s+(\\d{1,3})(?::(\\d{1,3})(?:-(\\d{1,3}))?)?",
    "gi"
  );

  function extractVerses(text){
    if(!text) return [];
    var found = [], seen = {};
    var match;
    verseRegex.lastIndex = 0;
    while((match = verseRegex.exec(text)) !== null){
      var ref = match[1].replace(/\.$/,"").trim() + " " + match[2] + (match[3] ? ":" + match[3] : "") + (match[4] ? "-" + match[4] : "");
      ref = ref.replace(/\s+/g," ");
      if(!seen[ref.toLowerCase()]){
        seen[ref.toLowerCase()] = true;
        found.push(ref);
      }
    }
    return found;
  }

  // ---------- Storage ----------
  var STORAGE_KEY = "parchmentDream_notes";

  function loadNotes(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  function saveNotes(notes){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }catch(e){
      alert("Could not save — your device storage may be full.");
    }
  }

  var notes = loadNotes();

  // ---------- Elements ----------
  var titleEl = document.getElementById("noteTitle");
  var preacherEl = document.getElementById("notePreacher");
  var topicEl = document.getElementById("noteTopic");
  var dateEl = document.getElementById("noteDate");
  var bodyEl = document.getElementById("noteBody");
  var reflectionEl = document.getElementById("noteReflection");
  var actionEl = document.getElementById("noteAction");
  var weeklyFocusEl = document.getElementById("weeklyFocus");
  var detectedWrap = document.getElementById("detectedWrap");
  var saveBtn = document.getElementById("saveBtn");
  var clearBtn = document.getElementById("clearBtn");
  var libraryList = document.getElementById("libraryList");
  var countTag = document.getElementById("countTag");
  var searchInput = document.getElementById("searchInput");

  // default date = today
  dateEl.value = new Date().toISOString().slice(0,10);

  function renderDetected(){
    var verses = extractVerses(bodyEl.value);
    if(verses.length === 0){
      detectedWrap.innerHTML = "";
      return;
    }
    var html = '<div class="detected-label">Scripture sealed from this note</div><div class="chips">';
    verses.forEach(function(v){
      html += '<span class="seal">&#10013; ' + escapeHtml(v) + '</span>';
    });
    html += "</div>";
    detectedWrap.innerHTML = html;
  }

  bodyEl.addEventListener("input", renderDetected);

  function clearComposer(){
    titleEl.value = "";
    preacherEl.value = "";
    topicEl.value = "";
    bodyEl.value = "";
    reflectionEl.value = "";
    actionEl.value = "";
    dateEl.value = new Date().toISOString().slice(0,10);
    renderDetected();
    titleEl.focus();
  }
  clearBtn.addEventListener("click", clearComposer);

  saveBtn.addEventListener("click", function(){
    if(!bodyEl.value.trim() && !titleEl.value.trim()){
      bodyEl.focus();
      return;
    }
    var note = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
      title: titleEl.value.trim() || "Untitled note",
      preacher: preacherEl.value.trim(),
      topic: topicEl.value.trim(),
      date: dateEl.value || new Date().toISOString().slice(0,10),
      body: bodyEl.value.trim(),
      reflection: reflectionEl.value.trim(),
      action: actionEl.value.trim(),
      verses: extractVerses(bodyEl.value),
      createdAt: Date.now()
    };
    notes.unshift(note);
    saveNotes(notes);
    clearComposer();
    renderLibrary();
    updateWeeklyFocus();
  });

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  function formatDate(iso){
    if(!iso) return "";
    var d = new Date(iso + "T00:00:00");
    if(isNaN(d.getTime())) return iso;
    return d.toLocaleDateString(undefined, {year:"numeric", month:"short", day:"numeric"});
  }

  function noteMatchesQuery(note, q){
    if(!q) return true;
    q = q.toLowerCase();
    var haystack = [note.title, note.preacher, note.topic, note.body]
      .concat(note.verses || [])
      .join(" ")
      .toLowerCase();
    return haystack.indexOf(q) !== -1;
  }

  function renderLibrary(){
    var query = searchInput.value.trim();
    var visible = notes.filter(function(n){ return noteMatchesQuery(n, query); });

    countTag.textContent = notes.length + (notes.length === 1 ? " sealed" : " sealed");

    if(notes.length === 0){
      libraryList.innerHTML = '<div class="empty-state">Nothing sealed yet. The first note you save will rest here.</div>';
      return;
    }
    if(visible.length === 0){
      libraryList.innerHTML = '<div class="empty-state">No notes match that search.</div>';
      return;
    }

    var html = "";
    visible.forEach(function(note){
      html += '<article class="note-card" data-id="' + note.id + '">';
      html += '<div class="note-top">';
      html += '<h3 class="note-title">' + escapeHtml(note.title) + '</h3>';
      html += '<span class="note-date">' + formatDate(note.date) + '</span>';
      html += '</div>';

      html += '<div class="note-meta">';
      if(note.preacher) html += '<span class="tag-chip">' + escapeHtml(note.preacher) + '</span>';
      if(note.topic) html += '<span class="tag-chip">' + escapeHtml(note.topic) + '</span>';
      (note.verses || []).forEach(function(v){
        html += '<span class="seal">&#10013; ' + escapeHtml(v) + '</span>';
      });
      html += '</div>';

      if(note.body){
        html += '<div class="note-body collapsed" data-full="' + escapeHtml(note.body).replace(/"/g,'&quot;') + '">' + escapeHtml(note.body) + '</div>';
      }

      if(note.reflection){
        html += '<div class="reflection-block"><span class="r-label">What God said</span><div class="r-text">' + escapeHtml(note.reflection) + '</div></div>';
      }
      if(note.action){
        html += '<div class="reflection-block"><span class="r-label">This week</span><div class="r-text">' + escapeHtml(note.action) + '</div></div>';
      }

      html += '<div class="note-actions">';
      html += '<button class="link-btn expand-btn" type="button">Read full note</button>';
      html += '<button class="link-btn danger delete-btn" type="button" data-confirming="false">Delete</button>';
      html += '</div>';
      html += '</article>';
    });
    libraryList.innerHTML = html;

    // wire up expand + delete
    libraryList.querySelectorAll(".note-card").forEach(function(card){
      var id = card.getAttribute("data-id");
      var expandBtn = card.querySelector(".expand-btn");
      var bodyDiv = card.querySelector(".note-body");
      var deleteBtn = card.querySelector(".delete-btn");

      if(expandBtn && bodyDiv){
        expandBtn.addEventListener("click", function(){
          var collapsed = bodyDiv.classList.toggle("collapsed");
          expandBtn.textContent = collapsed ? "Read full note" : "Show less";
        });
      }
      if(deleteBtn){
        var confirmTimer = null;
        deleteBtn.addEventListener("click", function(){
          if(deleteBtn.getAttribute("data-confirming") === "true"){
            clearTimeout(confirmTimer);
            notes = notes.filter(function(n){ return n.id !== id; });
            saveNotes(notes);
            renderLibrary();
            updateWeeklyFocus();
            return;
          }
          deleteBtn.setAttribute("data-confirming", "true");
          deleteBtn.textContent = "Tap again to confirm";
          confirmTimer = setTimeout(function(){
            deleteBtn.setAttribute("data-confirming", "false");
            deleteBtn.textContent = "Delete";
          }, 3000);
        });
      }
    });
  }

  function updateWeeklyFocus(){
    if(!notes.length){
      weeklyFocusEl.textContent = "No focus yet — write a note and name one thing.";
      return;
    }
    var latest = notes[0];
    if(latest.action){
      weeklyFocusEl.textContent = '"' + latest.action + '"';
    } else {
      weeklyFocusEl.textContent = "No action set on your latest note yet.";
    }
  }

  searchInput.addEventListener("input", renderLibrary);

  renderDetected();
  renderLibrary();
  updateWeeklyFocus();
})();
</script>
</body>
</html>
