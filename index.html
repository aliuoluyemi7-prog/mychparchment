<style>
  :root{
    --parchment:#F1E6CC;
    --parchment-deep:#E6D6AC;
    --parchment-card:#F6EDD6;
    --ink:#2B2419;
    --ink-soft:#5A4F3C;
    --wine:#7A2E2E;
    --wine-deep:#5E2222;
    --gold:#A9802E;
    --gold-soft:#C9A35C;
    --sepia-line:#CBB888;
    --shadow:rgba(43,36,25,0.18);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--parchment);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(169,128,46,0.08), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(122,46,46,0.06), transparent 60%);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    line-height:1.5;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{max-width:760px;margin:0 auto;padding:28px 18px 80px;}

  .tab-nav{display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid var(--sepia-line);}
  .tab-btn{
    flex:1;padding:12px;background:none;border:none;cursor:pointer;
    font-size:14px;font-weight:600;color:var(--ink-soft);
    border-bottom:3px solid transparent;margin-bottom:-2px;
    transition:all 0.2s;
  }
  .tab-btn.active{color:var(--wine);border-bottom-color:var(--wine);}
  .tab-btn:hover{color:var(--wine);}

  .tab-content{display:none;}
  .tab-content.active{display:block;}

  header{text-align:center;margin-bottom:30px;position:relative;}
  header .crest{width:84px;height:auto;margin:0 auto 10px;display:block;filter:drop-shadow(0 3px 6px var(--shadow));}
  h1{font-family:Georgia, serif;font-weight:700;font-size:clamp(34px,7vw,46px);letter-spacing:0.5px;margin:0 0 4px;}
  header p.tagline{font-style:italic;color:var(--ink-soft);font-size:15px;margin:0;}

  .section{
    background:var(--parchment-card);
    border:1px solid var(--sepia-line);
    border-radius:3px;
    padding:22px 20px;
    margin-bottom:20px;
    box-shadow:0 4px 14px var(--shadow);
    position:relative;
  }
  .section::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:repeating-linear-gradient(90deg, var(--gold-soft) 0 10px, transparent 10px 16px);opacity:0.5;}
  .section-title{font-family:Georgia, serif;font-size:24px;font-weight:600;margin:0 0 16px;color:var(--wine);}

  .bible-controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  select, input, textarea{padding:8px 10px;border:1px solid var(--sepia-line);background:white;color:var(--ink);font-size:14px;border-radius:2px;font-family:inherit;}

  .verse-display{background:white;padding:16px;border-left:3px solid var(--gold-soft);margin:16px 0;font-style:italic;line-height:1.7;}
  .verse-ref{font-weight:600;color:var(--wine);display:block;margin-bottom:8px;font-style:normal;}

  .search-results{max-height:400px;overflow-y:auto;margin:16px 0;}
  .search-result{padding:12px;margin:8px 0;background:white;border-left:3px solid var(--gold);cursor:pointer;font-size:13px;}
  .search-result:hover{background:#f9f5f0;}

  textarea{min-height:100px;resize:vertical;}

  .note-item{background:white;padding:14px;margin:12px 0;border-left:3px solid var(--wine-deep);position:relative;}
  .note-date{font-size:12px;color:var(--ink-soft);margin-bottom:6px;}
  .note-delete{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--gold);cursor:pointer;font-size:18px;}

  button{padding:10px 18px;background:var(--wine);color:white;border:none;border-radius:2px;cursor:pointer;font-size:14px;font-weight:600;}
  button:hover{background:var(--wine-deep);}

  .loading{text-align:center;padding:20px;color:var(--ink-soft);font-style:italic;}
  .error{background:#ffe6e6;color:#c00;padding:14px;border-radius:2px;margin:12px 0;}

  h2{margin-top:20px;margin-bottom:12px;}
  .sub-heading{font-size:13px;color:var(--ink-soft);margin:12px 0 8px;}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <svg class="crest" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#C9A35C;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#A9802E;stop-opacity:1" />
        </linearGradient>
      </defs>
      <circle cx="50" cy="50" r="48" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
      <path d="M 50 20 L 60 40 L 50 35 L 40 40 Z" fill="url(#goldGrad)"/>
      <path d="M 50 50 Q 50 60 45 70 Q 50 75 55 70 Q 50 60 50 50" fill="url(#goldGrad)"/>
    </svg>
    <h1>Parchment</h1>
    <p class="tagline">Carry the Word through your week.</p>
  </header>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('bible')">Bible</button>
    <button class="tab-btn" onclick="switchTab('sermon')">Sermon</button>
    <button class="tab-btn" onclick="switchTab('devotion')">Devotion</button>
  </div>

  <!-- BIBLE TAB -->
  <div id="bible" class="tab-content active">
    <div class="section">
      <h2 class="section-title">⸗ Bible</h2>

      <h3 class="sub-heading">Navigate</h3>
      <div class="bible-controls">
        <select id="bookSelect" onchange="onBookChange()">
          <option value="">Select Book...</option>
        </select>
        <select id="chapterSelect" onchange="onChapterChange()" disabled>
          <option value="">Select Chapter...</option>
        </select>
      </div>

      <div id="verseDisplay"></div>

      <h3 class="sub-heading">Search Scripture</h3>
      <input type="text" id="searchInput" placeholder="Search KJV (e.g., 'love', 'grace')" onkeyup="searchBible()">
      <div id="searchResults" class="search-results"></div>

      <div id="bibleStatus" class="loading">Loading Bible...</div>
    </div>
  </div>

  <!-- SERMON TAB -->
  <div id="sermon" class="tab-content">
    <div class="section">
      <h2 class="section-title">📖 Sermon Notes</h2>

      <h3 class="sub-heading">Add Note</h3>
      <textarea id="noteInput" placeholder="Write your sermon notes here..."></textarea>
      <button onclick="addNote()" style="margin-top:10px;width:100%;">Save Note</button>

      <h3 class="sub-heading" style="margin-top:20px;">Recent Notes</h3>
      <div id="notesList"></div>
    </div>
  </div>

  <!-- DEVOTION TAB -->
  <div id="devotion" class="tab-content">
    <div class="section">
      <h2 class="section-title">✝ Daily Devotion</h2>
      <p style="color:var(--ink-soft);font-style:italic;">Carry one word through your week.</p>
      <div id="devotionContent" style="margin-top:20px;"></div>
    </div>
  </div>

</div>

<script>
// BibleModule now loads ONE book at a time instead of one giant kjv.json.
// Book files come from the public-domain KJV JSON set (one file per book,
// e.g. Genesis.json, 1Chronicles.json, SongofSolomon.json) sitting in the
// same folder as this index.html, plus a Books.json listing all 66 names
// in canonical order.
class BibleModule {
  constructor() {
    this.bookList = null;   // array of 66 book names, canonical order
    this.cache = {};        // bookName -> { name, chapters: [...] }
  }

  filenameFor(bookName) {
    return bookName.replace(/\s+/g, '') + '.json';
  }

  async loadBookList() {
    if (this.bookList) return this.bookList;
    const response = await fetch('./Books.json');
    if (!response.ok) throw new Error('Failed to load Books.json');
    this.bookList = await response.json();
    return this.bookList;
  }

  async loadBook(bookName) {
    if (this.cache[bookName]) return this.cache[bookName];
    const response = await fetch('./' + this.filenameFor(bookName));
    if (!response.ok) throw new Error('Failed to load ' + bookName);
    const data = await response.json();
    const normalized = {
      name: data.book,
      chapters: data.chapters.map(ch => ({
        chapter: parseInt(ch.chapter, 10),
        verses: ch.verses.map(v => ({ verse: parseInt(v.verse, 10), text: v.text }))
      }))
    };
    this.cache[bookName] = normalized;
    return normalized;
  }

  async getChapters(bookName) {
    const book = await this.loadBook(bookName);
    return book.chapters.map(c => c.chapter);
  }

  async getVerses(bookName, chapterNum) {
    const book = await this.loadBook(bookName);
    const chapter = book.chapters.find(c => c.chapter === chapterNum);
    if (!chapter) return {};
    const verseObj = {};
    chapter.verses.forEach(v => { verseObj[v.verse] = v.text; });
    return verseObj;
  }

  // Loads every book (only once, then cached) so search can scan the
  // whole KJV. First search after opening the app may take a moment on
  // a slow connection; afterwards it's instant.
  async searchBible(query, onProgress) {
    if (!query.trim()) return [];
    const books = await this.loadBookList();
    for (let i = 0; i < books.length; i++) {
      if (!this.cache[books[i]]) {
        await this.loadBook(books[i]);
        if (onProgress) onProgress(i + 1, books.length);
      }
    }
    const lowerQuery = query.toLowerCase();
    const results = [];
    books.forEach(bookName => {
      const book = this.cache[bookName];
      book.chapters.forEach(chapter => {
        chapter.verses.forEach(verse => {
          if (verse.text.toLowerCase().includes(lowerQuery)) {
            results.push({ book: bookName, chapter: chapter.chapter, verse: verse.verse, text: verse.text });
          }
        });
      });
    });
    return results.slice(0, 50);
  }
}

const bible = new BibleModule();

async function initBible() {
  const status = document.getElementById('bibleStatus');
  try {
    await bible.loadBookList();
    status.innerHTML = '';
    populateBookSelect();
  } catch (err) {
    console.error('Bible load error:', err);
    status.innerHTML = '<div class="error">Failed to load Bible. Make sure Books.json and the book files are uploaded to the repo.</div>';
  }
}

function populateBookSelect() {
  const bookSelect = document.getElementById('bookSelect');
  bible.bookList.forEach(book => {
    const option = document.createElement('option');
    option.value = book;
    option.textContent = book;
    bookSelect.appendChild(option);
  });
}

async function onBookChange() {
  const bookSelect = document.getElementById('bookSelect');
  const chapterSelect = document.getElementById('chapterSelect');
  const verseDisplay = document.getElementById('verseDisplay');
  const selectedBook = bookSelect.value;
  if (!selectedBook) {
    chapterSelect.disabled = true;
    chapterSelect.innerHTML = '<option value="">Select Chapter...</option>';
    verseDisplay.innerHTML = '';
    return;
  }
  chapterSelect.disabled = true;
  chapterSelect.innerHTML = '<option value="">Loading...</option>';
  verseDisplay.innerHTML = '';
  try {
    const chapters = await bible.getChapters(selectedBook);
    chapterSelect.innerHTML = '<option value="">Select Chapter...</option>';
    chapters.forEach(ch => {
      const option = document.createElement('option');
      option.value = ch;
      option.textContent = `Chapter ${ch}`;
      chapterSelect.appendChild(option);
    });
    chapterSelect.disabled = false;
  } catch (err) {
    chapterSelect.innerHTML = '<option value="">Failed to load book</option>';
  }
}

async function onChapterChange() {
  const bookSelect = document.getElementById('bookSelect');
  const chapterSelect = document.getElementById('chapterSelect');
  const verseDisplay = document.getElementById('verseDisplay');
  const selectedBook = bookSelect.value;
  const selectedChapter = parseInt(chapterSelect.value);
  if (!selectedBook || !selectedChapter) {
    verseDisplay.innerHTML = '';
    return;
  }
  verseDisplay.innerHTML = '<div class="loading">Loading...</div>';
  const verses = await bible.getVerses(selectedBook, selectedChapter);
  let html = `<div class="verse-ref">${selectedBook} ${selectedChapter}</div>`;
  Object.entries(verses).forEach(([verseNum, text]) => {
    html += `<div style="margin-bottom:12px;"><strong>${verseNum}:</strong> ${text}</div>`;
  });
  verseDisplay.innerHTML = `<div class="verse-display">${html}</div>`;
}

let searchDebounce = null;
function searchBible() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(runSearch, 400);
}

async function runSearch() {
  const input = document.getElementById('searchInput');
  const resultsDiv = document.getElementById('searchResults');
  const query = input.value.trim();
  if (!query) {
    resultsDiv.innerHTML = '';
    return;
  }
  resultsDiv.innerHTML = '<p style="color:var(--ink-soft);font-style:italic;">Searching...</p>';
  const results = await bible.searchBible(query, (done, total) => {
    resultsDiv.innerHTML = `<p style="color:var(--ink-soft);font-style:italic;">Indexing ${done}/${total} books (first search only)...</p>`;
  });
  let html = '';
  if (results.length === 0) {
    html = '<p style="color:var(--ink-soft);font-style:italic;">No verses found.</p>';
  } else {
    results.forEach(r => {
      html += `<div class="search-result"><strong>${r.book} ${r.chapter}:${r.verse}</strong><br>${r.text.substring(0, 80)}...</div>`;
    });
  }
  resultsDiv.innerHTML = html;
}

function addNote() {
  const input = document.getElementById('noteInput');
  const text = input.value.trim();
  if (!text) return;
  const notes = JSON.parse(localStorage.getItem('notes') || '[]');
  notes.unshift({date: new Date().toLocaleString(), text: text});
  localStorage.setItem('notes', JSON.stringify(notes));
  input.value = '';
  renderNotes();
}

function deleteNote(index) {
  const notes = JSON.parse(localStorage.getItem('notes') || '[]');
  notes.splice(index, 1);
  localStorage.setItem('notes', JSON.stringify(notes));
  renderNotes();
}

function renderNotes() {
  const notesList = document.getElementById('notesList');
  const notes = JSON.parse(localStorage.getItem('notes') || '[]');
  if (notes.length === 0) {
    notesList.innerHTML = '<p style="color:var(--ink-soft);font-style:italic;">No notes yet.</p>';
    return;
  }
  let html = '';
  notes.forEach((note, i) => {
    html += `<div class="note-item"><div class="note-date">${note.date}</div><div>${note.text}</div><button class="note-delete" onclick="deleteNote(${i})">✕</button></div>`;
  });
  notesList.innerHTML = html;
}

function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(tabName).classList.add('active');
  event.target.classList.add('active');
}

window.addEventListener('load', () => {
  initBible();
  renderNotes();
});
</script>

</body>
</html>
